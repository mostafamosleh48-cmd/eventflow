name: CI/CD

on:
  workflow_dispatch:
  pull_request:
  push:
    branches:
      - main

jobs:
  lint:
    name: Lint
    runs-on: ubuntu-latest
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run lint
        run: npm run lint

  typecheck:
    name: Typecheck
    runs-on: ubuntu-latest
    needs: lint
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run typecheck
        run: npx tsc --noEmit

  test:
    name: Test
    runs-on: ubuntu-latest
    needs: typecheck
    services:
      postgres:
        image: postgres:16
        env:
          POSTGRES_DB: eventflow_test
          POSTGRES_USER: eventflow
          POSTGRES_PASSWORD: eventflow
        ports:
          - 5432:5432
        options: >-
          --health-cmd "pg_isready -U eventflow -d eventflow_test"
          --health-interval 10s
          --health-timeout 5s
          --health-retries 5
    env:
      DATABASE_URL: postgres://eventflow:eventflow@localhost:5432/eventflow_test
      NODE_ENV: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Run tests
        run: npm test

  docker-build-verify:
    name: Docker Build Verify
    runs-on: ubuntu-latest
    needs: test
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js 20
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Build Docker image
        run: docker build -t eventflow-ci .

  deploy:
    name: Deploy to Cloud Run
    runs-on: ubuntu-latest
    needs: docker-build-verify
    if: github.event_name == 'workflow_dispatch'
    permissions:
      contents: read
      id-token: write
    env:
      PROJECT_ID: ${{ vars.GCP_PROJECT_ID }}
      REGION: ${{ vars.GCP_REGION }}
      CLOUD_RUN_SERVICE: ${{ vars.CLOUD_RUN_SERVICE }}
      AR_REPO: ${{ vars.AR_REPO }}
      DATABASE_URL_PROD: ${{ secrets.DATABASE_URL_PROD }}
    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Authenticate to Google Cloud (OIDC)
        uses: google-github-actions/auth@v2
        with:
          workload_identity_provider: ${{ vars.GCP_WIF_PROVIDER }}
          service_account: ${{ vars.GCP_DEPLOY_SERVICE_ACCOUNT }}

      - name: Setup gcloud CLI
        uses: google-github-actions/setup-gcloud@v2

      - name: Resolve deployment inputs
        run: |
          PROJECT_ID_RESOLVED="${PROJECT_ID:-$(gcloud config get-value project 2>/dev/null || true)}"
          REGION_RESOLVED="${REGION:-$(gcloud config get-value run/region 2>/dev/null || true)}"
          REGION_RESOLVED="${REGION_RESOLVED:-us-central1}"
          AR_REPO_RESOLVED="${AR_REPO:-eventflow}"
          SERVICE_NAME_RESOLVED="${CLOUD_RUN_SERVICE:-eventflow-api}"

          if [ -z "$PROJECT_ID_RESOLVED" ]; then
            echo "Missing project id. Set vars.GCP_PROJECT_ID or configure gcloud project."
            exit 1
          fi

          if [ -z "$DATABASE_URL_PROD" ]; then
            echo "Missing DATABASE_URL_PROD secret. Cloud Run deploy requires DATABASE_URL."
            exit 1
          fi

          echo "PROJECT_ID_RESOLVED=$PROJECT_ID_RESOLVED" >> "$GITHUB_ENV"
          echo "REGION_RESOLVED=$REGION_RESOLVED" >> "$GITHUB_ENV"
          echo "AR_REPO_RESOLVED=$AR_REPO_RESOLVED" >> "$GITHUB_ENV"
          echo "SERVICE_NAME_RESOLVED=$SERVICE_NAME_RESOLVED" >> "$GITHUB_ENV"

      - name: Configure gcloud defaults
        run: |
          gcloud config set project "$PROJECT_ID_RESOLVED"
          gcloud config set run/region "$REGION_RESOLVED"
          gcloud services enable run.googleapis.com artifactregistry.googleapis.com cloudbuild.googleapis.com

      - name: Ensure Artifact Registry repository exists
        run: |
          gcloud artifacts repositories describe "$AR_REPO_RESOLVED" --location "$REGION_RESOLVED" >/dev/null 2>&1 || \
          gcloud artifacts repositories create "$AR_REPO_RESOLVED" \
            --repository-format=docker \
            --location "$REGION_RESOLVED" \
            --description "Eventflow Docker images"

      - name: Build and push container image
        env:
          IMAGE_TAG: ${{ github.sha }}-${{ github.run_number }}
        run: |
          IMAGE_URI="$REGION_RESOLVED-docker.pkg.dev/$PROJECT_ID_RESOLVED/$AR_REPO_RESOLVED/eventflow-api:$IMAGE_TAG"
          echo "IMAGE_URI=$IMAGE_URI" >> "$GITHUB_ENV"
          gcloud builds submit --tag "$IMAGE_URI" .

      - name: Deploy to Cloud Run
        run: |
          gcloud run deploy "$SERVICE_NAME_RESOLVED" \
            --image "$IMAGE_URI" \
            --region "$REGION_RESOLVED" \
            --platform managed \
            --allow-unauthenticated \
            --min-instances 0 \
            --set-env-vars "NODE_ENV=production" \
            --set-env-vars "DATABASE_URL=$DATABASE_URL_PROD" \
            --port 3000

      - name: Get service URL
        run: |
          SERVICE_URL="$(gcloud run services describe "$SERVICE_NAME_RESOLVED" --region "$REGION_RESOLVED" --format='value(status.url)')"
          echo "SERVICE_URL=$SERVICE_URL" >> "$GITHUB_ENV"
          echo "Deployed service URL: $SERVICE_URL"

      - name: Validate /health endpoint
        run: |
          HTTP_CODE="$(curl -sS -o /dev/null -w "%{http_code}" "$SERVICE_URL/health")"
          if [ "$HTTP_CODE" != "200" ]; then
            echo "Health check failed with HTTP $HTTP_CODE"
            exit 1
          fi
